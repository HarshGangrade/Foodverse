<!DOCTYPE html>
<html>

<head>

<title>Checkout</title>

<style>

body{

font-family:Arial;
background:#f4f5f7;

display:flex;
justify-content:center;
align-items:center;

height:100vh;

}

.checkout{

background:white;

padding:40px;

border-radius:15px;

width:350px;

box-shadow:0 10px 25px rgba(0,0,0,0.15);

}

input{

width:100%;

padding:10px;

margin:10px 0;

border-radius:6px;

border:1px solid #ccc;

}

button{

width:100%;

padding:12px;

border:none;

background:#7b61ff;

color:white;

border-radius:8px;

cursor:pointer;

font-size:16px;

}

</style>

</head>

<body>

<div class="checkout">

<h2>Payment Details</h2>

<input placeholder="Card Number">

<input placeholder="Name on Card">

<input placeholder="Expiry Date">

<input placeholder="CVV">

<button onclick="pay()">Pay Now</button>

</div>

<script>

function pay(){

alert("Payment Successful 🎉")

localStorage.removeItem("cartData")

window.location.href="index.html"

}

</script>

</body>

</html>
