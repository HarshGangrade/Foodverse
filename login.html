<!DOCTYPE html>
<html>
<head>

<title>Login</title>

<link rel="stylesheet" href="style.css">

<style>

.login-container{

height:90vh;

display:flex;
justify-content:center;
align-items:center;

}

.login-box{

background:white;

padding:40px;

border-radius:15px;

width:320px;

box-shadow:0 10px 30px rgba(0,0,0,0.15);

text-align:center;

}

.login-box input{

width:100%;

padding:10px;

margin:10px 0;

border-radius:6px;

border:1px solid #ccc;

}

.login-box button{

width:100%;

padding:12px;

border:none;

background:#7b61ff;

color:white;

border-radius:8px;

cursor:pointer;

}

</style>

</head>

<body>

<nav class="navbar">

<div class="logo">🍔 FoodVerse</div>

<ul class="nav-links">

<li onclick="goHome()">Home</li>
<li>Menu</li>
<li>Orders</li>
<li>About</li>

</ul>

</nav>


<div class="login-container">

<div class="login-box">

<h2>Login</h2>

<input placeholder="Email">

<input type="password" placeholder="Password">

<button onclick="login()">Login</button>

</div>

</div>

<script>

function goHome(){

window.location.href="welcome.html"

}

function login(){

alert("Login Successful 🎉")

window.location.href="index.html"

}

</script>

</body>

</html>
