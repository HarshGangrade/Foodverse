<!DOCTYPE html>
<html>
<head>

<title>FoodVerse</title>
<link rel="stylesheet" href="style.css">

<style>

.hero-welcome{

height:90vh;

display:flex;
align-items:center;
justify-content:center;

flex-direction:column;

background:linear-gradient(135deg,#7b61ff,#5f6dfc);

color:white;

text-align:center;

}

.hero-welcome h1{

font-size:60px;
margin-bottom:20px;

}

.hero-welcome p{

font-size:20px;
margin-bottom:30px;

}

.hero-welcome button{

padding:15px 35px;

border:none;

border-radius:30px;

background:white;

color:#5f6dfc;

font-size:18px;

cursor:pointer;

}

.hero-welcome button:hover{

transform:scale(1.05);

}

</style>

</head>

<body>

<!-- SAME NAVBAR -->

<nav class="navbar">

<div class="logo">🍔 FoodVerse</div>

<ul class="nav-links">

<li>Home</li>
<li>Menu</li>
<li>Orders</li>
<li>About</li>

</ul>

<div class="nav-right">

<button onclick="openLogin()" class="login-btn">Login</button>

</div>

</nav>


<section class="hero-welcome">

<h1>Welcome to FoodVerse 🍔</h1>

<p>Discover delicious food from the best kitchens around you</p>

<button onclick="goToFood()">Order Food</button>

</section>

<script>

function goToFood(){

window.location.href="index.html"

}

function openLogin(){

window.location.href="login.html"

}

</script>

</body>

</html>
